<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Radar scores élève</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f7fa;
      padding: 16px;
    }
    h2 {
      text-align: center;
      margin-bottom: 16px;
      color: #333;
      font-size: 1.1rem;
    }
    .grilles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .carte {
      background: white;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .carte h3 {
      text-align: center;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .mermaid {
      display: flex;
      justify-content: center;
    }
    #aucun {
      text-align: center;
      margin-top: 60px;
      color: #aaa;
      font-style: italic;
    }
  </style>
</head>
<body>

<div id="aucun">Sélectionnez un élève dans la table.</div>
<h2 id="titre" style="display:none"></h2>
<div class="grilles" id="grilles" style="display:none">
  <div class="carte">
    <h3>🗣 Langage</h3>
    <div class="mermaid" id="chart-lang"></div>
  </div>
  <div class="carte">
    <h3>🔢 Mathématiques</h3>
    <div class="mermaid" id="chart-math"></div>
  </div>
  <div class="carte">
    <h3>🤝 Comportement</h3>
    <div class="mermaid" id="chart-compor"></div>
  </div>
  <div class="carte">
    <h3>📚 Apprentissages</h3>
    <div class="mermaid" id="chart-apprent"></div>
  </div>
</div>

<script>
  mermaid.initialize({ startOnLoad: false, theme: 'default' });

  const categories = {
    lang: {
      id: 'chart-lang',
      axes: [
        { col: 'lang_comprehension',    label: 'Compréhension' },
        { col: 'lang_fluence',          label: 'Fluence' },
        { col: 'lang_expression_orale', label: 'Expr. orale' },
        { col: 'lang_expression_ecrite',label: 'Expr. écrite' },
        { col: 'lang_vocabulaire',      label: 'Vocabulaire' },
      ]
    },
    math: {
      id: 'chart-math',
      axes: [
        { col: 'math_calcul',       label: 'Calcul' },
        { col: 'math_numeration',   label: 'Numération' },
        { col: 'math_geometrie',    label: 'Géométrie' },
        { col: 'math_resolution',   label: 'Résolution' },
        { col: 'math_raisonnement', label: 'Raisonnement' },
      ]
    },
    compor: {
      id: 'chart-compor',
      axes: [
        { col: 'compor_attention',     label: 'Attention' },
        { col: 'compor_autonomie',     label: 'Autonomie' },
        { col: 'compor_organisation',  label: 'Organisation' },
        { col: 'compor_participation', label: 'Participation' },
        { col: 'compor_relations',     label: 'Relations' },
      ]
    },
    apprent: {
      id: 'chart-apprent',
      axes: [
        { col: 'apprent_memorisation', label: 'Mémorisation' },
        { col: 'apprent_transfert',    label: 'Transfert' },
        { col: 'apprent_vitesse',      label: 'Vitesse' },
        { col: 'apprent_consignes',    label: 'Consignes' },
        { col: 'apprent_perseverance', label: 'Persévérance' },
      ]
    }
  };

  function buildMermaid(axes, record) {
    const lines = axes.map(a => {
      const val = record[a.col] ?? 0;
      return `    "${a.label}" : ${val}`;
    });
    return `radar-beta\n  max 5\n${lines.join('\n')}`;
  }

  async function renderCharts(record) {
    document.getElementById('aucun').style.display = 'none';
    document.getElementById('titre').style.display = 'block';
    document.getElementById('grilles').style.display = 'grid';

    const prenom = record.Prenom || '';
    const nom = record.Nom || '';
    document.getElementById('titre').textContent = `${prenom} ${nom}`;

    for (const [, cat] of Object.entries(categories)) {
      const el = document.getElementById(cat.id);
      const code = buildMermaid(cat.axes, record);
      el.innerHTML = '';
      el.removeAttribute('data-processed');
      el.textContent = code;
      try {
        const { svg } = await mermaid.render('m-' + cat.id + '-' + Date.now(), code);
        el.innerHTML = svg;
      } catch(e) {
        el.textContent = 'Erreur de rendu : ' + e.message;
      }
    }
  }

  grist.ready({ requiredAccess: 'read table' });
  grist.onRecord(record => {
    if (!record) return;
    renderCharts(record);
  });
</script>
</body>
</html>
