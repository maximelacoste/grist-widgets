<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Radar scores élève</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; }

    /* ── TOPBAR ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      position: sticky; top: 0; z-index: 10;
    }
    #topbar h2 { font-size: 0.95rem; color: #2d3748; }
    #aucun { font-size: 0.85rem; color: #a0aec0; font-style: italic; }
    #btn-config {
      background: none; border: none; cursor: pointer;
      font-size: 1.2rem; padding: 4px 8px; border-radius: 6px;
      color: #718096; transition: background 0.15s;
    }
    #btn-config:hover { background: #edf2f7; }

    /* ── GRILLE GRAPHES ── */
    #grilles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 12px;
    }
    .carte {
      background: white;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .carte h3 {
      text-align: center;
      font-size: 0.78rem;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    canvas { max-height: 200px; }

    /* ── OVERLAY CONFIG ── */
    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: flex-start;
      justify-content: flex-end;
    }
    #overlay.open { display: flex; }
    #panel {
      width: 360px;
      height: 100%;
      background: white;
      overflow-y: auto;
      box-shadow: -4px 0 20px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
    }
    #panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #e2e8f0;
      background: #f7fafc;
      position: sticky; top: 0; z-index: 5;
    }
    #panel-header h3 { font-size: 0.95rem; color: #2d3748; }
    #btn-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; color: #718096;
    }
    #panel-body { padding: 12px; flex: 1; }

    /* ── BOUTON AJOUTER ── */
    #btn-add {
      width: 100%;
      padding: 9px;
      margin-bottom: 10px;
      background: #ebf8ff;
      border: 1.5px dashed #90cdf4;
      border-radius: 8px;
      color: #3182ce;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-add:hover { background: #bee3f8; }

    /* ── ACCORDÉON ── */
    .accordion {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .accordion-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: #f7fafc;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: #2d3748;
      user-select: none;
    }
    .accordion-header:hover { background: #edf2f7; }
    .accordion-title { flex: 1; }
    .accordion-actions { display: flex; gap: 6px; align-items: center; }
    .btn-move {
      background: none; border: none; cursor: pointer;
      font-size: 0.85rem; color: #a0aec0; padding: 2px 4px; border-radius: 4px;
    }
    .btn-move:hover { background: #e2e8f0; color: #4a5568; }
    .btn-delete {
      background: none; border: none; cursor: pointer;
      font-size: 0.85rem; color: #fc8181; padding: 2px 4px; border-radius: 4px;
    }
    .btn-delete:hover { background: #fff5f5; color: #e53e3e; }
    .accordion-arrow {
      margin-left: 4px; font-size: 1rem; font-weight: 700;
      color: #718096; min-width: 16px; text-align: center;
    }
    .accordion-body {
      display: none;
      padding: 12px;
      border-top: 1px solid #e2e8f0;
    }
    .accordion.open .accordion-body { display: block; }

    /* ── CHAMPS CONFIG ── */
    .field-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }
    .field-row label { font-size: 0.78rem; color: #4a5568; min-width: 60px; }
    .field-row input[type="text"],
    .field-row input[type="number"] {
      flex: 1;
      border: 1px solid #cbd5e0;
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 0.82rem;
    }
    .field-row input[type="color"] {
      width: 36px; height: 30px;
      border: 1px solid #cbd5e0;
      border-radius: 5px;
      padding: 2px; cursor: pointer;
    }
    .emoji-input { max-width: 50px !important; text-align: center; }
    .col-label { font-size: 0.78rem; color: #4a5568; margin-bottom: 6px; font-weight: 600; }
    .cols-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      max-height: 160px;
      overflow-y: auto;
      border: 1px solid #e2e8f0;
      border-radius: 5px;
      padding: 6px;
    }
    .col-check {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.75rem; color: #4a5568; cursor: pointer;
    }
    .col-check input { cursor: pointer; }

    /* ── FOOTER PANEL ── */
    #panel-footer {
      padding: 12px 16px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #f7fafc;
      position: sticky; bottom: 0;
    }
    #btn-save {
      width: 100%;
      background: #4299e1;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 9px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    #btn-save:hover { background: #3182ce; }
    #btn-cancel {
      width: 100%;
      background: white;
      color: #718096;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      padding: 9px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    #btn-cancel:hover { background: #edf2f7; }
    #save-msg { font-size: 0.75rem; color: #48bb78; text-align: center; min-height: 16px; }
  </style>
</head>
<body>

<div id="topbar">
  <div>
    <h2 id="titre" style="display:none"></h2>
    <div id="aucun">Sélectionnez un élève dans la table.</div>
  </div>
  <button id="btn-config" title="Configuration">⚙️</button>
</div>

<div id="grilles"></div>

<div id="overlay">
  <div id="panel">
    <div id="panel-header">
      <h3>⚙️ Configuration</h3>
      <button id="btn-close">✕</button>
    </div>
    <div id="panel-body">
      <button id="btn-add">＋ Ajouter un graphe</button>
      <div id="accordions"></div>
    </div>
    <div id="panel-footer">
      <button id="btn-save">💾 Enregistrer</button>
      <button id="btn-cancel">Annuler</button>
      <div id="save-msg"></div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG PAR DÉFAUT ─────────────────────────────────────────────
const DEFAULT_CONFIG = [
  {
    emoji: '🗣', title: 'Langage', color: '#63b3ed', gridColor: '#cbd5e0', max: 5,
    columns: ['lang_comprehension','lang_fluence','lang_expression_orale','lang_expression_ecrite','lang_vocabulaire'],
    labels:  ['Compréhension','Fluence','Expr. orale','Expr. écrite','Vocabulaire']
  },
  {
    emoji: '🔢', title: 'Mathématiques', color: '#9ae6b4', gridColor: '#cbd5e0', max: 5,
    columns: ['math_calcul','math_numeration','math_geometrie','math_resolution','math_raisonnement'],
    labels:  ['Calcul','Numération','Géométrie','Résolution','Raisonnement']
  },
  {
    emoji: '🤝', title: 'Comportement', color: '#fc814a', gridColor: '#cbd5e0', max: 5,
    columns: ['compor_attention','compor_autonomie','compor_organisation','compor_participation','compor_relations'],
    labels:  ['Attention','Autonomie','Organisation','Participation','Relations']
  },
  {
    emoji: '📚', title: 'Apprentissages', color: '#b794f4', gridColor: '#cbd5e0', max: 5,
    columns: ['apprent_memorisation','apprent_transfert','apprent_vitesse','apprent_consignes','apprent_perseverance'],
    labels:  ['Mémorisation','Transfert','Vitesse','Consignes','Persévérance']
  }
];

const PALETTE = ['#63b3ed','#9ae6b4','#fc814a','#b794f4','#f6ad55','#fc8181','#4fd1c5','#667eea'];

let config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
let allColumns = [];
let currentRecord = null;
let charts = {};

// ─── RENDU GRAPHES ─────────────────────────────────────────────────
function rebuildGrid() {
  const grilles = document.getElementById('grilles');
  // Détruire les charts existants
  Object.values(charts).forEach(c => c && c.destroy());
  charts = {};
  grilles.innerHTML = '';

  config.forEach((cat, i) => {
    const card = document.createElement('div');
    card.className = 'carte';
    card.id = `card-${i}`;
    card.innerHTML = `<h3 id="title-${i}"></h3><canvas id="chart-${i}"></canvas>`;
    grilles.appendChild(card);
  });
}

function renderCharts(record) {
  currentRecord = record;
  document.getElementById('aucun').style.display = 'none';
  document.getElementById('titre').style.display = 'block';
  document.getElementById('titre').textContent = `${record.Prenom || ''} ${record.Nom || ''}`;

  config.forEach((cat, i) => {
    const titleEl = document.getElementById(`title-${i}`);
    const canvasEl = document.getElementById(`chart-${i}`);
    if (!titleEl || !canvasEl) return;

    titleEl.textContent = `${cat.emoji} ${cat.title}`;
    const labels = cat.columns.map((col, j) => cat.labels[j] || col);
    const data   = cat.columns.map(col => record[col] ?? 0);
    const rgba      = hexToRgba(cat.color);
    const gridColor = cat.gridColor || '#cbd5e0';

    if (charts[i]) {
      charts[i].data.labels = labels;
      charts[i].data.datasets[0].data = data;
      charts[i].data.datasets[0].backgroundColor = rgba.bg;
      charts[i].data.datasets[0].borderColor = rgba.border;
      charts[i].data.datasets[0].pointBackgroundColor = rgba.border;
      charts[i].options.scales.r.max = cat.max;
      charts[i].options.scales.r.grid.color = gridColor;
      charts[i].options.scales.r.angleLines.color = gridColor;
      charts[i].update();
    } else {
      const ctx = canvasEl.getContext('2d');
      charts[i] = new Chart(ctx, {
        type: 'radar',
        data: {
          labels,
          datasets: [{
            label: 'Score',
            data,
            backgroundColor: rgba.bg,
            borderColor: rgba.border,
            borderWidth: 2,
            pointBackgroundColor: rgba.border,
            pointRadius: 3,
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            r: {
              min: 0, max: cat.max,
              grid: { color: gridColor },
              angleLines: { color: gridColor },
              ticks: { stepSize: 1, font: { size: 10 } },
              pointLabels: { font: { size: 11 } }
            }
          }
        }
      });
    }
  });
}

// ─── PANNEAU CONFIG ────────────────────────────────────────────────
function openPanel() {
  buildPanel();
  document.getElementById('overlay').classList.add('open');
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
}

function buildPanel() {
  const container = document.getElementById('accordions');
  container.innerHTML = '';
  config.forEach((cat, i) => container.appendChild(buildAccordion(cat, i)));
}

function buildAccordion(cat, i) {
  const excluded = ['id', 'Nom', 'Prenom', 'manualSort'];
  const available = allColumns.filter(c => !excluded.includes(c));

  const acc = document.createElement('div');
  acc.className = 'accordion';
  acc.dataset.idx = i;

  const colsHtml = available.length === 0
    ? '<em style="font-size:0.75rem;color:#a0aec0">Sélectionnez d\'abord un élève</em>'
    : available.map(col => `
        <label class="col-check">
          <input type="checkbox" data-col="${col}" ${cat.columns.includes(col) ? 'checked' : ''}>
          ${col}
        </label>`).join('');

  acc.innerHTML = `
    <div class="accordion-header">
      <span class="accordion-title">${cat.emoji} ${cat.title}</span>
      <div class="accordion-actions">
        <button class="btn-move" data-dir="up" title="Monter">▲</button>
        <button class="btn-move" data-dir="down" title="Descendre">▼</button>
        <button class="btn-delete" title="Supprimer">🗑</button>
        <span class="accordion-arrow">＋</span>
      </div>
    </div>
    <div class="accordion-body">
      <div class="field-row">
        <label>Emoji</label>
        <input type="text" class="emoji-input" data-field="emoji" value="${cat.emoji}" maxlength="2">
        <label style="margin-left:8px">Titre</label>
        <input type="text" data-field="title" value="${cat.title}">
      </div>
      <div class="field-row">
        <label>Contour</label>
        <input type="color" data-field="color" value="${cat.color}">
        <label style="margin-left:8px">Repère</label>
        <input type="color" data-field="gridColor" value="${cat.gridColor || '#cbd5e0'}">
        <label style="margin-left:8px">Max</label>
        <input type="number" data-field="max" value="${cat.max}" min="1" max="100" style="max-width:60px">
      </div>
      <div class="col-label">Colonnes incluses :</div>
      <div class="cols-grid">${colsHtml}</div>
    </div>
  `;

  // Toggle accordéon
  acc.querySelector('.accordion-header').addEventListener('click', e => {
    if (e.target.closest('.accordion-actions button')) return;
    acc.classList.toggle('open');
    acc.querySelector('.accordion-arrow').textContent = acc.classList.contains('open') ? '－' : '＋';
  });

  // Mise à jour live des champs
  acc.querySelectorAll('input[data-field]').forEach(inp => {
    inp.addEventListener('input', () => {
      const field = inp.dataset.field;
      const val = inp.type === 'number' ? parseInt(inp.value) || 1 : inp.value;
      const idx = getAccordionIndex(acc);
      config[idx][field] = val;
      acc.querySelector('.accordion-title').textContent = `${config[idx].emoji} ${config[idx].title}`;
    });
  });

  // Monter / Descendre
  acc.querySelector('[data-dir="up"]').addEventListener('click', e => {
    e.stopPropagation();
    const idx = getAccordionIndex(acc);
    if (idx > 0) {
      [config[idx-1], config[idx]] = [config[idx], config[idx-1]];
      buildPanel();
    }
  });
  acc.querySelector('[data-dir="down"]').addEventListener('click', e => {
    e.stopPropagation();
    const idx = getAccordionIndex(acc);
    if (idx < config.length - 1) {
      [config[idx], config[idx+1]] = [config[idx+1], config[idx]];
      buildPanel();
    }
  });

  // Supprimer
  acc.querySelector('.btn-delete').addEventListener('click', e => {
    e.stopPropagation();
    if (config.length <= 1) return;
    const idx = getAccordionIndex(acc);
    config.splice(idx, 1);
    buildPanel();
  });

  return acc;
}

function getAccordionIndex(acc) {
  return Array.from(document.getElementById('accordions').children).indexOf(acc);
}

// ─── AJOUTER UN GRAPHE ─────────────────────────────────────────────
document.getElementById('btn-add').addEventListener('click', () => {
  const newCat = {
    emoji: '📊',
    title: `Graphe ${config.length + 1}`,
    color: PALETTE[config.length % PALETTE.length],
    gridColor: '#cbd5e0',
    max: 5,
    columns: [],
    labels: []
  };
  config.push(newCat);
  buildPanel();
  // Scroller vers le bas
  setTimeout(() => {
    const last = document.getElementById('accordions').lastElementChild;
    if (last) { last.classList.add('open'); last.scrollIntoView({ behavior: 'smooth' }); }
  }, 50);
});

// ─── SAUVEGARDE ───────────────────────────────────────────────────
async function saveConfig() {
  // Récupérer les colonnes cochées
  const accordions = document.getElementById('accordions').children;
  Array.from(accordions).forEach((acc, i) => {
    const checked = Array.from(acc.querySelectorAll('input[type="checkbox"]:checked')).map(b => b.dataset.col);
    if (checked.length > 0) {
      config[i].columns = checked;
      config[i].labels = checked.map(col => {
        for (const def of DEFAULT_CONFIG) {
          const j = def.columns.indexOf(col);
          if (j >= 0) return def.labels[j];
        }
        return col;
      });
    }
  });

  try {
    await grist.setOption('radarConfig', JSON.stringify(config));
    document.getElementById('save-msg').textContent = '✅ Sauvegardé !';
    rebuildGrid();
    if (currentRecord) renderCharts(currentRecord);
    setTimeout(() => {
      document.getElementById('save-msg').textContent = '';
      closePanel();
    }, 900);
  } catch(e) {
    document.getElementById('save-msg').textContent = '⚠️ Erreur : ' + e.message;
  }
}

// ─── UTILITAIRES ──────────────────────────────────────────────────
function hexToRgba(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return { bg: `rgba(${r},${g},${b},0.2)`, border: `rgba(${r},${g},${b},1)` };
}

// ─── ÉVÉNEMENTS UI ────────────────────────────────────────────────
document.getElementById('btn-config').addEventListener('click', openPanel);
document.getElementById('btn-close').addEventListener('click', closePanel);
document.getElementById('btn-cancel').addEventListener('click', closePanel);
document.getElementById('btn-save').addEventListener('click', saveConfig);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closePanel();
});

// ─── GRIST API ────────────────────────────────────────────────────
grist.ready({ requiredAccess: 'read table' });

grist.onOptions(options => {
  if (options && options.radarConfig) {
    try { config = JSON.parse(options.radarConfig); } catch(e) {}
  }
  rebuildGrid();
  if (currentRecord) renderCharts(currentRecord);
});

grist.onRecord(record => {
  if (!record) return;
  if (allColumns.length === 0) allColumns = Object.keys(record);
  if (Object.keys(charts).length === 0) rebuildGrid();
  renderCharts(record);
});
</script>
</body>
</html>
